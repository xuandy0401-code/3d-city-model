<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IC South Kensington – 3D Campus Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#080c18}

    /* ── Canvas ─────────────────────────────────────────────────────────────── */
    #canvas-container{position:fixed;inset:0;z-index:0}
    #canvas-container canvas{display:block}

    /* ── Loading ─────────────────────────────────────────────────────────────── */
    #loading{
      position:fixed;inset:0;z-index:100;background:#080c18;
      display:flex;align-items:center;justify-content:center;
      flex-direction:column;gap:16px;text-align:center;
      transition:opacity .5s;
    }
    #loading h2{color:#c8d8ff;font-weight:500;font-size:1.25rem;letter-spacing:.04em}
    .progress-track{width:280px;height:4px;background:#1a2040;border-radius:99px;overflow:hidden}
    #loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#5b8cff,#a78bfa);border-radius:99px;transition:width .25s ease}
    #loading-status{color:#3a5070;font-size:.75rem}

    /* ── Top bar ─────────────────────────────────────────────────────────────── */
    #topbar{
      position:fixed;top:0;left:0;right:0;z-index:10;height:50px;
      background:linear-gradient(180deg,rgba(8,12,24,.96) 0%,transparent 100%);
      display:flex;align-items:center;padding:0 18px;gap:12px;pointer-events:none;
    }
    .badge{background:rgba(91,140,255,.15);border:1px solid rgba(91,140,255,.3);
      color:#6ea8ff;font-size:.65rem;font-weight:600;letter-spacing:.1em;
      padding:2px 9px;border-radius:99px;text-transform:uppercase}
    #topbar h1{color:#d0e4ff;font-size:.95rem;font-weight:500}

    /* ── Legend ──────────────────────────────────────────────────────────────── */
    #legend{
      position:fixed;top:60px;left:16px;z-index:10;
      background:rgba(8,14,30,.78);border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);border-radius:10px;padding:10px 14px;width:136px;
    }
    .legend-title{color:#4a6080;font-size:.62rem;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;margin-bottom:7px}
    .legend-bar{height:7px;border-radius:99px;
      background:linear-gradient(90deg,#4a90e2,#2a9d8f,#e9c46a,#e76f51);margin-bottom:4px}
    .legend-labels{display:flex;justify-content:space-between;color:#3a5070;font-size:.6rem}

    /* ── Hint / stats ────────────────────────────────────────────────────────── */
    #hint{position:fixed;bottom:16px;left:16px;z-index:10;
      color:#2e3e5c;font-size:.7rem;line-height:1.8;pointer-events:none}
    .hk{display:inline-block;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
      color:#607090;font-size:.65rem;padding:1px 5px;border-radius:3px;margin:0 2px}
    #stats{position:fixed;bottom:16px;right:18px;z-index:10;
      text-align:right;color:#2a3a58;font-size:.7rem;line-height:1.7;pointer-events:none}
    #stats strong{color:#4a6a9a}

    /* ── Tooltip ─────────────────────────────────────────────────────────────── */
    #tooltip{position:fixed;z-index:20;pointer-events:none;
      background:rgba(8,14,32,.93);border:1px solid rgba(91,140,255,.28);
      color:#c0d4f0;font-size:.76rem;padding:7px 12px;border-radius:8px;
      backdrop-filter:blur(10px);white-space:nowrap;
      transition:opacity .12s;
    }
    #tooltip.hidden{opacity:0}
    .tt-name{font-weight:500}
    .tt-sub{color:#4a6080;font-size:.68rem;margin-top:2px}

    /* ── Side panel ──────────────────────────────────────────────────────────── */
    #side-panel{
      position:fixed;top:0;right:0;bottom:0;z-index:30;width:380px;
      background:rgba(7,12,26,.9);border-left:1px solid rgba(91,140,255,.15);
      backdrop-filter:blur(22px);
      display:flex;flex-direction:column;
      transform:translateX(0);transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .3s;
    }
    #side-panel.hidden{transform:translateX(100%);opacity:0;pointer-events:none}

    .panel-header{padding:16px 18px 12px;border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
    .panel-title-wrap{flex:1;min-width:0}
    .panel-cat{display:inline-block;background:rgba(91,140,255,.14);color:#5b8cff;
      font-size:.62rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
      padding:2px 8px;border-radius:99px;margin-bottom:5px}
    #panel-name{color:#ddeeff;font-size:1rem;font-weight:600;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .panel-meta{display:flex;gap:14px;margin-top:5px}
    .pm-item{display:flex;align-items:center;gap:4px;color:#4a6080;font-size:.72rem}
    .pm-icon{font-size:.85rem;opacity:.8}
    #panel-close{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
      color:#607090;font-size:1rem;cursor:pointer;
      width:28px;height:28px;border-radius:6px;flex-shrink:0;margin-left:10px;
      display:flex;align-items:center;justify-content:center;transition:all .15s}
    #panel-close:hover{background:rgba(255,80,80,.15);color:#ff8080;border-color:rgba(255,80,80,.28)}

    /* direction filter tabs */
    .dir-tabs{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px 8px;
      border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0}
    .dir-tab{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
      color:#4a6080;font-size:.68rem;font-weight:500;padding:3px 10px;border-radius:99px;
      cursor:pointer;transition:all .15s}
    .dir-tab:hover{background:rgba(91,140,255,.12);color:#7fb3ff}
    .dir-tab.active{background:rgba(91,140,255,.2);color:#90c4ff;border-color:rgba(91,140,255,.45)}

    /* gallery */
    #image-gallery{flex:1;overflow-y:auto;padding:10px 14px 16px;
      scrollbar-width:thin;scrollbar-color:#1a2840 transparent}
    #image-gallery::-webkit-scrollbar{width:4px}
    #image-gallery::-webkit-scrollbar-thumb{background:#1a2840;border-radius:99px}
    .gallery-empty{text-align:center;padding:36px 16px;color:#2e3e58;font-size:.82rem;line-height:1.8}
    .gallery-empty .icon{font-size:2.2rem;margin-bottom:8px}

    .heading-section{margin-bottom:12px}
    .heading-label{color:#3a5070;font-size:.67rem;font-weight:600;letter-spacing:.1em;
      text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;
      border-bottom:1px solid rgba(255,255,255,.05)}

    .img-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}

    /* image card */
    .img-card{position:relative;border-radius:7px;overflow:hidden;cursor:pointer;
      aspect-ratio:1;background:#0c1424;
      border:1px solid rgba(255,255,255,.05);transition:transform .15s,box-shadow .15s}
    .img-card:hover{transform:scale(1.03);box-shadow:0 4px 18px rgba(0,0,0,.55);
      border-color:rgba(91,140,255,.28);z-index:1}
    .img-card img{width:100%;height:100%;object-fit:cover;display:block}
    .img-overlay{position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent,rgba(0,0,0,.72));
      padding:16px 7px 6px;display:flex;justify-content:space-between;align-items:flex-end}
    .img-dist{color:#9ab8d8;font-size:.62rem}
    .img-dir{background:rgba(91,140,255,.35);color:#a0c4ff;font-size:.6rem;
      font-weight:600;padding:1px 5px;border-radius:4px}
    .img-skeleton{width:100%;height:100%;
      background:linear-gradient(90deg,#0c1424 25%,#121e38 50%,#0c1424 75%);
      background-size:200% 100%;animation:shimmer 1.5s infinite}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* per-card download btn */
    .card-dl{position:absolute;top:5px;right:5px;
      background:rgba(0,0,0,.65);border:none;color:#ccddf0;font-size:.75rem;
      width:24px;height:24px;border-radius:50%;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .15s;z-index:2}
    .img-card:hover .card-dl{opacity:1}
    .card-dl:hover{background:rgba(91,140,255,.55)!important}

    /* ── Lightbox ─────────────────────────────────────────────────────────────── */
    #lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:0;backdrop-filter:blur(12px)}
    #lightbox.hidden{display:none}
    #lb-img-wrap{display:flex;align-items:center;justify-content:center;position:relative}
    #lb-img{max-width:80vw;max-height:78vh;border-radius:10px;
      box-shadow:0 20px 60px rgba(0,0,0,.8);display:block}
    .lb-arrow{position:absolute;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      color:#fff;font-size:1.8rem;cursor:pointer;width:46px;height:46px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;transition:background .15s}
    .lb-arrow:hover{background:rgba(255,255,255,.22)}
    #lb-prev{left:-70px}
    #lb-next{right:-70px}
    #lb-close{position:absolute;top:16px;right:16px;z-index:201;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
      color:#fff;font-size:1rem;cursor:pointer;width:34px;height:34px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;transition:background .15s}
    #lb-close:hover{background:rgba(255,80,80,.3)}

    /* lightbox footer: caption + download btn */
    #lb-footer{display:flex;align-items:center;justify-content:center;gap:16px;
      margin-top:14px;width:100%}
    #lb-caption{color:rgba(255,255,255,.5);font-size:.78rem;
      background:rgba(0,0,0,.4);padding:4px 14px;border-radius:99px}
    #lb-download{background:rgba(91,140,255,.2);border:1px solid rgba(91,140,255,.4);
      color:#90c4ff;font-size:.8rem;font-weight:500;
      padding:6px 18px;border-radius:8px;cursor:pointer;
      display:flex;align-items:center;gap:6px;transition:all .15s}
    #lb-download:hover{background:rgba(91,140,255,.38);color:#c0daff;border-color:rgba(91,140,255,.7)}
    #lb-download .dl-icon{font-size:1rem}
  </style>
</head>
<body>

<div id="canvas-container"></div>

<!-- Loading -->
<div id="loading">
  <div style="font-size:2.8rem;margin-bottom:8px">🏙</div>
  <h2>IC Campus 3D Explorer</h2>
  <p style="color:#3a5070;font-size:.78rem;margin:-4px 0 8px">帝国理工学院南肯辛顿校区</p>
  <div class="progress-track"><div id="loading-bar"></div></div>
  <p id="loading-status">正在加载建筑数据…</p>
</div>

<!-- Top bar -->
<div id="topbar">
  <span class="badge">3D City Model</span>
  <h1>IC South Kensington Campus</h1>
</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-title">建筑高度</div>
  <div class="legend-bar"></div>
  <div class="legend-labels"><span>≤10m</span><span>35m</span><span>≥65m</span></div>
</div>

<!-- Hint -->
<div id="hint">
  <span><span class="hk">左键拖</span>旋转 &nbsp;<span class="hk">右键拖</span>平移 &nbsp;<span class="hk">滚轮</span>缩放</span><br/>
  <span style="color:#233048">点击建筑 → 查看街景图片</span>
</div>

<!-- Stats -->
<div id="stats">
  <div><strong id="stat-buildings">—</strong> 栋建筑</div>
  <div><strong id="stat-with-img">—</strong> 有街景图</div>
</div>

<!-- Tooltip -->
<div id="tooltip" class="hidden">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-sub"  id="tt-sub"></div>
</div>

<!-- Side panel -->
<div id="side-panel" class="hidden">
  <div class="panel-header">
    <div class="panel-title-wrap">
      <div class="panel-cat" id="panel-cat">Building</div>
      <div id="panel-name">—</div>
      <div class="panel-meta">
        <div class="pm-item"><span class="pm-icon">📐</span><span id="panel-height">—</span></div>
        <div class="pm-item"><span class="pm-icon">📸</span><span id="panel-imgcount">—</span></div>
      </div>
    </div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="dir-tabs" id="dir-tabs"></div>
  <div id="image-gallery">
    <div class="gallery-empty"><div class="icon">🗺</div>暂无街景图片</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="hidden">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <div id="lb-img-wrap">
    <button class="lb-arrow" id="lb-prev" onclick="lbNav(-1)">‹</button>
    <img id="lb-img" src="" alt="Street View"/>
    <button class="lb-arrow" id="lb-next" onclick="lbNav(1)">›</button>
  </div>
  <div id="lb-footer">
    <div id="lb-caption">—</div>
    <button id="lb-download" onclick="downloadCurrentImage()">
      <span class="dl-icon">⬇</span> 下载图片
    </button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js"></script>
</body>
</html>
